<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>707</title>

<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.85em' font-size='90' fill='red'>7</text></svg>">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#000;
color:white;
overflow:hidden;
}

/* LOADING SCREEN */
#loader{
position:fixed;
inset:0;
background:#000;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
z-index:9999;
}

#loader h1{
font-size:90px;
color:#ff2d2d;
text-shadow:0 0 25px #ff2d2d;
animation:pulse 1.5s infinite;
}

@keyframes pulse{
0%{transform:scale(1);}
50%{transform:scale(1.2);}
100%{transform:scale(1);}
}

.bar{
width:200px;
height:4px;
background:#222;
margin-top:20px;
overflow:hidden;
border-radius:10px;
}

.bar span{
display:block;
height:100%;
width:0%;
background:#ff2d2d;
animation:load 2.5s forwards;
}

@keyframes load{
to{width:100%;}
}

/* MAIN */
main{
opacity:0;
transition:1s;
}

/* NAV */
nav{
position:fixed;
top:0;
width:100%;
display:flex;
justify-content:center;
gap:40px;
padding:18px;
background:rgba(0,0,0,0.6);
backdrop-filter:blur(10px);
border-bottom:1px solid rgba(255,0,0,0.2);
z-index:1000;
}

nav a{
color:white;
text-decoration:none;
font-weight:bold;
}

nav a:hover{
color:#ff2d2d;
}

/* HERO */
.hero{
min-height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
background:
linear-gradient(rgba(0,0,0,0.8),rgba(0,0,0,0.95)),
url("https://images.unsplash.com/photo-1520975958225-9a5f1f0a2d6c") center/cover;
}

.logo{
font-size:170px;
font-weight:900;
color:#ff2d2d;
text-shadow:0 0 25px #ff2d2d;
}

.desc{
max-width:700px;
margin-top:20px;
color:#ccc;
font-size:18px;
}

/* SECTIONS */
.section{
min-height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
padding:100px 20px;
background:#050505;
}

.section h2{
color:#ff2d2d;
font-size:55px;
margin-bottom:40px;
}

/* CARDS */
.card{
background:#111;
padding:25px;
border-radius:12px;
margin:10px;
border:1px solid #222;
text-align:center;
}

.card h3{color:#ff2d2d}

/* DISCORD */
.btn{
padding:15px 40px;
background:#5865F2;
color:white;
text-decoration:none;
border-radius:10px;
display:inline-block;
margin-top:20px;
}

/* PARTICLES */
canvas{
position:fixed;
inset:0;
z-index:-1;
}

</style>
</head>

<body>

<!-- LOADER -->
<div id="loader">
<h1>707</h1>
<div class="bar"><span></span></div>
</div>

<!-- MUSIC -->
<audio id="music" loop>
<source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_c8a7c6b6f2.mp3?filename=dark-ambient-110191.mp3" type="audio/mpeg">
</audio>

<canvas id="particles"></canvas>

<main>

<nav>
<a href="#home">Ana</a>
<a href="#team">Ekip</a>
<a href="#discord">Discord</a>
</nav>

<section class="hero" id="home">

<div class="logo">707</div>

<div class="desc">
Bir ekipten fazlası. 707 bir ruh, bir bağ, bir kardeşliktir.
</div>

</section>

<section class="section" id="team">

<h2>Ekip</h2>

<div class="card"><h3>!Ruzy</h3><p>Kurucu</p></div>
<div class="card"><h3>qti!</h3><p>Yönetim</p></div>
<div class="card"><h3>Zkush</h3><p>Üye</p></div>
<div class="card"><h3>egekhanz</h3><p>Üye</p></div>
<div class="card"><h3>тυявαи</h3><p>Üye</p></div>

</section>

<section class="section" id="discord">

<h2>Discord</h2>

<p>707 Community’ye katıl</p>

<a class="btn" href="https://discord.com/invite/4AkH96FFyZ" target="_blank">
Katıl
</a>

</section>

</main>

<script>
/* LOADER */
window.onload = () => {
setTimeout(() => {
document.getElementById("loader").style.display="none";
document.querySelector("main").style.opacity="1";
document.getElementById("music").play();
document.body.style.overflow="auto";
}, 2500);
};

/* PARTICLES */
const c=document.getElementById("particles");
const x=c.getContext("2d");

c.width=innerWidth;
c.height=innerHeight;

let p=[];
for(let i=0;i<80;i++){
p.push({x:Math.random()*c.width,y:Math.random()*c.height,r:Math.random()*2});
}

function draw(){
x.clearRect(0,0,c.width,c.height);
for(let i of p){
x.fillStyle="rgba(255,0,0,0.6)";
x.beginPath();
x.arc(i.x,i.y,i.r,0,Math.PI*2);
x.fill();
i.x+=0.3;i.y+=0.3;
if(i.x>c.width)i.x=0;
if(i.y>c.height)i.y=0;
}
requestAnimationFrame(draw);
}
draw();
</script>

</body>
</html>
